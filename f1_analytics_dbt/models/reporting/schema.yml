
version: 2

models:
  - name: rpt_tyre_degradation
    description: "Report on tyre degradation based on lap times and tyre usage"
    columns:
      - name: lap_id
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null
      - name: season_driver_team_key
        data_tests:
          - not_null
          - relationships:
            arguments:
              to: ref('dim_season_drivers_teams')
              field: season_driver_team_key

  - name: rpt_pit_efficiency
    columns:
      - name: lap_id
        data_tests:
          - unique
          - not_null
      - name: season_driver_team_key
        data_tests:
          - not_null
          - relationships:
            arguments:
              to: ref('dim_season_drivers_teams')
              field: season_driver_team_key

  # due to break down of metrics by compound, the result_id is no more unique
  - name: rpt_race_result_vs_pace
    columns:
      - name: result_id
        data_tests:
          - not_null
      - name: season_driver_team_key
        data_tests:
          - not_null
          - relationships:
            arguments:
              to: ref('dim_season_drivers_teams')
              field: season_driver_team_key